<!DOCTYPE html>

<head>

    <script>
        // قاموس الترجمة للغات الثلاث
        const translations = {
            ar: {

                orLocal: "أو عبر حساب محلي",

                password: "كلمة المرور",
                rememberMe: "تذكر بياناتي",
                createAccount: "إنشاء حساب مستقل جديد؟",
                loginBtn: "دخول للمنصة",
                defaultUserHint: "الحساب الافتراضي: MOHAMED الرمز: 123456",
                tabForm: "تعبئة الفاتورة",
                tabPreview: "معاينة الفاتورة",
                adminPanel: "لوحة الإدارة",
                welcome: "مرحباً،",
                logout: "خروج",
                manageInventory: "📦 إدارة دليل السلع والمخزون الخاص بك",
                prodName: "اسم المادة",
                prodCategory: "الفئة (مثال: عصير)",
                prodPrice: "السعر (DZD)",
                prodStock: "الكمية المتوفرة",
                addInventory: "+ إضافة للمستودع",
                clientInfo: "بيانات الزبون أو الشركة المستلمة",
                clientNamePh: "اسم الزبون",
                addressPh: "العنوان",
                activityPh: "النشاط",
                rcPh: "السجل التجاري RC",
                quantitySelect: "صرف وتحديد كميات مواد الطلبية الحالية",
                searchPh: "ابحث في دليل السلع...",
                totalTtcLabel: "الإجمالي الإفتراضي للطلب الحاضر (TTC)",
                saveBtn: "حفظ التدوين",
                whatsappBtn: "إرسال واتساب",
                printBtn: "طباعة الفاتورة",
                quickPreview: "المعاينة السريعة",
                adminTitle: "لوحة الإدارة وتكوين الشركة",
                tvaLabel: "نسبة الضريبة TVA %",
                currencyLabel: "العملة",
                supplierNameLabel: "اسم الشركة الموردة",
                visualActivityLabel: "النشاط البصري",
                whatsappNumLabel: "رقم الهاتف للواتساب",
                saveCloseAdmin: "حفظ وإغلاق التكوين"
            },
            fr: { /* ... نفس المحتوى السابق ... */ },
            en: { /* ... نفس المحتوى السابق ... */ }
        };

        function numberToFrWords(num) {
            // ... نفس الدالة السابقة ...
            if (num === 0) return "Zéro Dinar";
            const units = ["", "Un", "Deux", "Trois", "Quatre", "Cinq", "Six", "Sept", "Huit", "Neuf"];
            const teens = ["Dix", "Onze", "Douze", "Treize", "Quatorze", "Quinze", "Seize", "Dix-sept", "Dix-huit", "Dix-neuf"];
            const tens = ["", "Dix", "Vingt", "Trente", "Quarante", "Cinquante", "Soixante", "Soixante-dix", "Quatre-vingt", "Quatre-vingt-dix"];
            
            function convertLessThanCent(n) {
                if (n < 10) return units[n];
                if (n < 20) return teens[n - 10];
                let ten = Math.floor(n / 10);
                let rest = n % 10;
                if (rest === 0) return tens[ten];
                if (ten === 7) return "Soixante-" + (rest === 1 ? "et-onze" : teens[rest]);
                if (ten === 9) return "Quatre-vingt-" + teens[rest];
                if (rest === 1) return tens[ten] + "-et-un";
                return tens[ten] + "-" + units[rest];
            }

            function convert(n) {
                if (n === 0) return "";
                if (n < 100) return convertLessThanCent(n);
                if (n < 1000) {
                    let cent = Math.floor(n / 100);
                    let rest = n % 100;
                    let centStr = cent === 1 ? "Cent" : units[cent] + " Cent";
                    return rest === 0 ? centStr : centStr + " " + convert(rest);
                }
                if (n < 1000000) {
                    let mille = Math.floor(n / 1000);
                    let rest = n % 1000;
                    let milleStr = mille === 1 ? "Mille" : convert(mille) + " Mille";
                    return rest === 0 ? milleStr : milleStr + " " + convert(rest);
                }
                let million = Math.floor(n / 1000000);
                let rest = n % 1000000;
                let millionStr = convert(million) + " Million";
                return rest === 0 ? millionStr : millionStr + " " + convert(rest);
            }

            let intPart = Math.floor(num);
            let decPart = Math.round((num - intPart) * 100);
            let words = convert(intPart) + " Dinars";
            if (decPart > 0) words += " et " + convertLessThanCent(decPart) + " Centimes";
            return words;
        }

        window.App = {
            state: {
                currentLang: "ar",
                products: [], 
                config: {
                    name: "Sarl MED Distribution", slogan: "عرض وتوزيع المواد والمشروبات", currency: "DZD", tva: 19,
                    capital: "10,000,000 DA", rc: "24/00 - 1234567 B24", nif: "002416012345678", nis: "002416090123456",
                    phone: "0550123456", address: "Zone Industrielle, Ouargla",
                    cliName: "Etablissement BRAVO", cliAddr: "12, Chemin Alliche, Alger", cliAct: "Grossiste d'alimentation", cliRc: "16/00 - 0999061 B16"
                },
                cart: {}, currentUser: "", currentUserEmail: "", currentUserPic: ""
            },

            init: function() {
                var savedLang = localStorage.getItem('hub_lang');
                if (savedLang) this.state.currentLang = savedLang;
                this.applyLanguageUI();

                var savedUser = localStorage.getItem('hub_logged_user');
                if (savedUser) {
                    this.state.currentUser = savedUser;
                    this.state.currentUserEmail = localStorage.getItem('hub_logged_email') || "";
                    this.state.currentUserPic = localStorage.getItem('hub_logged_pic') || "";
                    this.showMainApp();
                }

                if (!localStorage.getItem('hub_users_db')) {
                    localStorage.setItem('hub_users_db', JSON.stringify({ "MOHAMED": "123456", "ADMIN": "admin2026" }));
                }

                try {
                    var prefix = this.state.currentUser ? this.state.currentUser + "_" : "";
                    if (localStorage.getItem(prefix + 'hub_config')) this.state.config = JSON.parse(localStorage.getItem(prefix + 'hub_config'));
                    if (localStorage.getItem(prefix + 'hub_inventory')) this.state.products = JSON.parse(localStorage.getItem(prefix + 'hub_inventory'));
                    if (localStorage.getItem(prefix + 'hub_cart')) this.state.cart = JSON.parse(localStorage.getItem(prefix + 'hub_cart'));
                } catch(e) { console.error("Could not load local data", e); }
                
                document.getElementById('invDate').innerText = new Date().toLocaleDateString('fr-FR');
                this.loadInputsFromState();
                this.syncConfig();
                this.renderInventoryManagementList();
                this.renderProductsGrid();
            },

            changeLanguage: function(lang) {
                this.state.currentLang = lang;
                localStorage.setItem('hub_lang', lang);
                this.applyLanguageUI();
                this.renderProductsGrid();
            },

            applyLanguageUI: function() {
                var lang = this.state.currentLang;
                var dict = translations[lang];
                
                document.documentElement.lang = lang;
                document.body.dir = (lang === "ar") ? "rtl" : "ltr";
                if (document.getElementById('langSelect')) document.getElementById('langSelect').value = lang;

                document.querySelectorAll('[data-i18n]').forEach(el => {
                    var key = el.getAttribute('data-i18n');
                    if(dict[key]) el.innerText = dict[key];
                });

                document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                    var key = el.getAttribute('data-i18n-ph');
                    if(dict[key]) el.placeholder = dict[key];
                });
            },

            // باقي الدوال كما هي (handleLogin, handleGoogleLogin, ...)

            // ... (الكود كامل كما في النسخة السابقة) ...

            saveConfig: function() {
                localStorage.setItem(this.state.currentUser + "_hub_config", JSON.stringify(this.state.config));
                alert(this.state.currentLang === 'ar' ? "تم الحفظ بنجاح!" : "Saved successfully!");
            }
        };
    </script>
</head>
<body class="bg-[#f4f7fa] text-slate-800 min-h-screen pb-24 select-none">

            <div data-i18n="orLocal" class="flex items-center my-2 text-slate-300 text-[10px] before:content-[''] before:flex-1 before:border-b before:border-slate-200 before:ml-2 after:content-[''] after:flex-1 after:border-b after:border-slate-200 after:mr-2 font-bold">أو عبر حساب محلي</div>

            <div class="space-y-3 text-start">
                <div>
                    <label data-i18n="username" class="block text-xs font-bold text-slate-600 mb-1">اسم المستخدم</label>
                    <input type="text" id="loginUser" placeholder="MOHAMED" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:border-blue-500 font-bold">

                <div>

                        <input type="checkbox" id="loginRemember" class="rounded text-blue-600 w-3.5 h-3.5" checked>

            <p data-i18n="defaultUserHint" class="text-[9px] text-slate-400">الحساب الافتراضي: MOHAMED الرمز: 123456</p>
        </div>
    </div>
